# remove Configuración para WebSocket THEM
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip para archivos estáticos
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # Cacheo de recursos estáticos
  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Manejo de rutas de React Router
  location / {
    try_files $uri /index.html;
  }
  #Proxy Inverso [REMOVE] FOR THEM
  location /api/v1/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;


    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;


    # WebSockets
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Evita cache raro con upgrades
    proxy_cache_bypass $http_upgrade;
    
    # Timeouts (evita conexiones colgadas)
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
  }
}